services:
  redis:
    image: redis:7-alpine
    container_name: raindrop-dash-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  raindrop-dash:
    build: .
    container_name: raindrop-dash
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - RAINDROP_TOKEN=${RAINDROP_TOKEN}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - PORT=${PORT:-8080}
      - REDIS_URL=redis://redis:6379/0
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - READONLY_PASSWORD=${READONLY_PASSWORD:-}
      - SECRET_KEY=${SECRET_KEY:-}
      - DEMO_MODE=${DEMO_MODE:-}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8080}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
