services:
  raindrop-dash:
    build: .
    container_name: raindrop-dash
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - RAINDROP_TOKEN=${RAINDROP_TOKEN}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - PORT=${PORT:-8080}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
