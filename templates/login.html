<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raindrop Dashboard — Login</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #1a1e2e;
        color: #c9d1d9;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #222638;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      .logo {
        text-align: center;
        margin-bottom: 1.75rem;
      }

      .logo-icon {
        font-size: 2.2rem;
        line-height: 1;
      }

      .logo h1 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #e6edf3;
        margin-top: 0.5rem;
      }

      .logo p {
        font-size: 0.8rem;
        color: #7d8590;
        margin-top: 0.25rem;
      }

      label {
        display: block;
        font-size: 0.8rem;
        color: #7d8590;
        margin-bottom: 0.4rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      input[type="password"] {
        width: 100%;
        background: #1a1e2e;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #e6edf3;
        font-size: 0.95rem;
        padding: 0.6rem 0.8rem;
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="password"]:focus {
        border-color: #58a6ff;
      }

      .error {
        margin-top: 0.75rem;
        font-size: 0.82rem;
        color: #f85149;
        background: rgba(248, 81, 73, 0.1);
        border: 1px solid rgba(248, 81, 73, 0.3);
        border-radius: 6px;
        padding: 0.4rem 0.7rem;
      }

      button {
        width: 100%;
        margin-top: 1.25rem;
        padding: 0.65rem;
        background: #238636;
        border: 1px solid #2ea043;
        border-radius: 6px;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover {
        background: #2ea043;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="logo-icon">🌧</div>
        <h1>Raindrop Dashboard</h1>
        <p>Enter your password to continue</p>
      </div>
      <form method="post">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          autofocus
          autocomplete="current-password"
        />
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <button type="submit">Sign in</button>
      </form>
    </div>
  </body>
</html>
