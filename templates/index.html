<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1e2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Bookmarks" />
    <link rel="manifest" href="/static/manifest.json" />
    <link
      rel="icon"
      href="https://www.google.com/s2/favicons?domain=raindrop.io&sz=64"
    />
    <link
      rel="apple-touch-icon"
      href="https://www.google.com/s2/favicons?domain=raindrop.io&sz=128"
    />
    <title>Bookmarks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/app.css') }}"
    />
  </head>
  <body>
    <div id="toast" class="toast"></div>
    <div class="header">
      <div class="header-inner">
        <div class="logo">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z" />
          </svg>
          Bookmarks
        </div>
        <div class="search-box">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            type="text"
            id="search"
            placeholder="Search bookmarks…"
            autocomplete="off"
          />
        </div>
        <div class="header-actions">
          <span class="stats" id="stats"></span>
          <button class="btn" id="refreshBtn" onclick="refresh()">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
              <path d="M21 3v5h-5" />
            </svg>
            Refresh
          </button>
          {% if role != 'readonly' %}
          <button
            class="btn"
            onclick="openAddModal()"
            aria-label="Add bookmark"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add
          </button>
          {% endif %}
          <button
            class="menu-btn"
            onclick="openDrawer()"
            aria-label="Collections"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div
      class="drawer-overlay"
      id="drawerOverlay"
      onclick="closeDrawer()"
    ></div>
    <div class="sidebar-drawer" id="sidebarDrawer">
      <div class="drawer-close">
        <button onclick="closeDrawer()" aria-label="Close">&#x2715;</button>
      </div>
      <div id="drawerContent"></div>
    </div>

    <div
      class="modal-backdrop"
      id="editModal"
      onclick="if (event.target === this) closeEditModal();"
    >
      <div class="modal">
        <h2>Edit Bookmark</h2>
        <label
          >URL *
          <input
            type="url"
            id="editUrl"
            placeholder="https://example.com"
            autocomplete="off"
            autocapitalize="off"
          />
        </label>
        <label
          >Title
          <input type="text" id="editTitle" placeholder="Page title" />
        </label>
        <label
          >Collection
          <select id="editCollection">
            <option value="">Unsorted</option>
          </select>
        </label>
        <label
          >Tags <span style="font-weight: 400">(comma-separated)</span>
          <input type="text" id="editTags" placeholder="tag1, tag2" />
        </label>
        <label
          >Description
          <textarea
            id="editExcerpt"
            rows="2"
            placeholder="Brief description…"
            style="resize: vertical"
          ></textarea>
        </label>
        <label
          >Note
          <textarea
            id="editNote"
            rows="3"
            placeholder="Personal annotation…"
            style="resize: vertical"
          ></textarea>
        </label>
        <label class="fav-label">
          <input type="checkbox" id="editImportant" />
          <span>&#9829; Mark as Favorite</span>
        </label>
        <div class="modal-error" id="editError"></div>
        <div class="modal-actions">
          <button class="btn" onclick="closeEditModal()">Cancel</button>
          <button class="btn btn-primary" id="editSaveBtn" onclick="saveEdit()">
            Save
          </button>
        </div>
      </div>
    </div>

    <div
      class="modal-backdrop"
      id="addModal"
      onclick="handleModalBackdropClick(event)"
    >
      <div class="modal">
        <h2>Add Bookmark</h2>
        <label
          >URL *
          <input
            type="url"
            id="addUrl"
            placeholder="https://example.com"
            autocomplete="off"
            autocapitalize="off"
          />
        </label>
        <label
          >Title
          <span style="font-weight: 400"
            >(optional — Raindrop will fetch it if blank)</span
          >
          <input type="text" id="addTitle" placeholder="Page title" />
        </label>
        <label
          >Collection
          <select id="addCollection">
            <option value="">Unsorted</option>
          </select>
        </label>
        <label
          >Tags
          <span style="font-weight: 400">(optional, comma-separated)</span>
          <input type="text" id="addTags" placeholder="tag1, tag2" />
        </label>
        <label
          >Description
          <span style="font-weight: 400">(optional)</span>
          <textarea
            id="addExcerpt"
            rows="2"
            placeholder="Brief description…"
            style="resize: vertical"
          ></textarea>
        </label>
        <label class="fav-label">
          <input type="checkbox" id="addImportant" />
          <span>&#9829; Mark as Favorite</span>
        </label>
        <div class="modal-error" id="addError"></div>
        <div class="modal-actions">
          <button class="btn" onclick="closeAddModal()">Cancel</button>
          <button
            class="btn btn-primary"
            id="addSaveBtn"
            onclick="saveBookmark()"
          >
            Save
          </button>
        </div>
      </div>
    </div>

    <div class="tag-filter-bar" id="tagFilterBar">
      Filtering by tag: <strong id="tagFilterLabel"></strong>
      <button class="tag-filter-clear" onclick="clearTagFilter()">
        &#x2715; Clear
      </button>
    </div>

    <div class="layout">
      <nav class="sidebar" id="sidebar">
        <div class="sidebar-collections" id="sidebarCollections"></div>
        <div class="sidebar-footer">
          <a
            href="https://github.com/dreed47/raindrop-dash"
            target="_blank"
            rel="noopener"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"
              />
            </svg>
            dreed47/raindrop-dash
          </a>
          {% if auth_enabled %}
          <a href="/logout" style="margin-top: 8px">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Log out
          </a>
          {% endif %}
        </div>
      </nav>
      <main class="main" id="main">
        <div class="loading" id="loader">Loading bookmarks…</div>
      </main>
    </div>

    <script>
      const ROLE = "{{ role }}";
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
